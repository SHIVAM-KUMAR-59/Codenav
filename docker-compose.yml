services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env.docker
      - ./server/.env.prod
    environment:
      NODE_ENV: production
      PORT: 8000
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env.docker
    ports:
      - "5432:5432"
    volumes:
      - codenav_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  codenav_postgres_data:
