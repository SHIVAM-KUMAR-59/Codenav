name: PR Review Bot

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  pr-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch PR head and base
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "${BASE_REF}:${BASE_REF}"
          git fetch origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"

      - name: Analyze commits
        id: analyze
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          PR_COMMITS=$(git rev-list --count "${BASE_REF}..origin/pr-head")
          MERGE_COMMITS=$(git log --merges "${BASE_REF}..origin/pr-head" --oneline)

          echo "pr_commits=$PR_COMMITS" >> "$GITHUB_OUTPUT"

          echo "merge_commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MERGE_COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: actions/github-script@v7
        env:
          PR_COMMITS: ${{ steps.analyze.outputs.pr_commits }}
          MERGE_COMMITS: ${{ steps.analyze.outputs.merge_commits }}
        with:
          script: |
            const marker = '<!-- pr-bot -->';
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            const commits = Number.parseInt(process.env.PR_COMMITS || "1", 10);
            const mergeCommits = (process.env.MERGE_COMMITS || "").trim();

            const sections = [];

            if (commits >= 2) {
              sections.push(
                `### Squash Recommended\n\n` +
                `This PR has **${commits} commits**.\n\n` +
                `Please squash related commits into a single clean commit before merge.\n\n` +
                `#### Suggested commands\n` +
                `\`\`\`bash\n` +
                `git fetch origin\n` +
                `git rebase -i origin/${context.payload.pull_request.base.ref}\n` +
                `# mark all commits except the first as "squash" or "fixup"\n` +
                `git push --force-with-lease\n` +
                `\`\`\`\n`
              );
            }

            if (mergeCommits) {
              sections.push(
                `### Rebase Recommended\n\n` +
                `Merge commits were detected in this PR:\n\n` +
                `\`\`\`\n${mergeCommits}\n\`\`\`\n\n` +
                `Please rebase the branch onto the latest base branch to keep history linear.\n\n` +
                `#### Suggested commands\n` +
                `\`\`\`bash\n` +
                `git fetch origin\n` +
                `git rebase origin/${context.payload.pull_request.base.ref}\n` +
                `# resolve conflicts if needed\n` +
                `git push --force-with-lease\n` +
                `\`\`\`\n`
              );
            }

            if (sections.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const body =
              `${marker}\n## PR Quality Check\n\n` +
              sections.join('\n\n') +
              `\n\n---\n*Auto-updated on every push.*`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
